# XDG Desktop Portal configuration
# Controls which portal backend handles each portal interface.
#
# Without this file, all backends register with xdg-desktop-portal, and it
# routes requests to whichever backend responds first (often GTK, which
# lacks Wayland screen capture support). On Hyprland, explicitly routing
# ScreenCast to the hyprland portal is required for Discord/Zen Browser
# screen sharing to work in Wayland mode.
#
# See: man portals.conf(5)

[preferred]
# ScreenCast must go to xdg-desktop-portal-hyprland for window/screen capture
# on Hyprland (it uses the screencopy protocol, not X11).
org.freedesktop.impl.portal.screen-cast=xdg-desktop-portal-hyprland
# Screenshot also goes to hyprland so the picker UI is consistent.
org.freedesktop.impl.portal.screenshot=xdg-desktop-portal-hyprland
# File chooser and app chooser can use the GTK portal — no Wayland dependency.
org.freedesktop.impl.portal.file-chooser=xdg-desktop-portal-gtk
org.freedesktop.impl.portal.appchooser=xdg-desktop-portal-gtk
