# For multi GPU setups, Please manually test the environment that works best for you.

# Hyprland Nvidia Configuration
# See https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# __GLX_VENDOR_LIBRARY_NAME is intentionally kept ENABLED here (not disabled).
# On Hyprland + NVIDIA, Qt6 apps (including xdg-desktop-portal-hyprland's picker
# UI) need this for proper EGL context creation. Without it, the portal picker
# can segfault when initializing the Wayland platform.
#
# If you encounter crashes ONLY in the screen share picker dialog, try:
#   env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# If the portal picker crashes but other Qt6 apps work fine, try:
#   env = __GLX_VENDOR_LIBRARY_NAME,mesa
# See https://wiki.hypr.land/Nvidia/#regarding-environment-variables

# If you want to try hardware cursors,
# you can enable them by setting `cursor:no_hardware_cursors = false` ,
# but it will also require enabling `cursor:use_cpu_buffer`
cursor:no_hardware_cursors = true # Set to true to avoid hitches
# cursor:use_cpu_buffer = true

# https://wiki.hypr.land/Nvidia/#va-api-hardware-video-acceleration
# Hardware video acceleration on Nvidia and Wayland is
# possible with the nvidia-vaapi-driver.
# This may solve specific issues in Electron apps.
# env = NVD_BACKEND,direct # Requires 'libva-nvidia-driver' package

# If you have a multi-GPU setup and you are facing lag in external monitor.
# See https://wiki.hypr.land/Configuring/Multi-GPU/
